services:
  postgres:
    image: postgres:15
    container_name: core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_pass
      POSTGRES_DB: core_db
    ports:
      - "5588:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_user -d core_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  
volumes:
  postgres_data:
